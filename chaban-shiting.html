<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插班试听课申请表</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f4f8; min-height: 100vh; padding: 30px 16px; }
    .container { max-width: 660px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); overflow: hidden; }
    .header { background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); padding: 24px 32px 0; color: #fff; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-bottom: 18px; }
    .tabs { display: flex; }
    .tab-btn { flex: 1; padding: 11px 10px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; border-radius: 10px 10px 0 0; transition: background .2s, color .2s; letter-spacing: 0.5px; }
    .tab-btn.active { background: #fff; color: #1a73e8; }
    .tab-btn:not(.active) { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }
    .tab-btn:not(.active):hover { background: rgba(255,255,255,0.28); }
    .panel { display: none; padding: 26px 32px 32px; }
    .panel.active { display: block; }
    .section-title { font-size: 12.5px; font-weight: 700; color: #1a73e8; letter-spacing: 0.5px; margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 2px solid #e8f0fe; }
    .section-title:first-of-type { margin-top: 0; }
    .row { display: flex; gap: 14px; margin-bottom: 12px; }
    .field { flex: 1; display: flex; flex-direction: column; }
    .field label { font-size: 12.5px; color: #555; font-weight: 600; margin-bottom: 5px; }
    .field label .req { color: #e53935; margin-left: 2px; }
    .field input, .field textarea { border: 1.5px solid #dde3ea; border-radius: 8px; padding: 9px 12px; font-size: 14px; color: #222; background: #fafbfc; transition: border-color .2s, box-shadow .2s; font-family: inherit; width: 100%; }
    .field input:focus, .field textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.10); background: #fff; }
    .field textarea { resize: vertical; min-height: 68px; }
    .radio-group { display: flex; gap: 20px; align-items: center; padding: 8px 0 2px; }
    .radio-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; color: #333; font-weight: 400; cursor: pointer; }
    .radio-group input[type=radio] { width: 15px; height: 15px; accent-color: #1a73e8; }
    .notice { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 12px 14px; font-size: 12.5px; color: #5d4037; line-height: 1.7; margin-top: 10px; }
    .notice strong { color: #e65100; }
    .btn-row { margin-top: 24px; display: flex; gap: 12px; }
    .btn-primary { flex: 1; background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: opacity .2s, transform .1s; }
    .btn-primary:hover { opacity: .92; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-reset { background: #f1f3f4; color: #444; border: none; border-radius: 10px; padding: 14px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-reset:hover { background: #e2e5e9; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #323232; color: #fff; padding: 10px 22px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .3s, transform .3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }
    @media (max-width: 480px) { .panel { padding: 20px 18px 24px; } .row { flex-direction: column; gap: 10px; } .btn-row { flex-direction: column; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 插班试听课申请表</h1>
    <div class="tabs">
      <button class="tab-btn active" id="tab-qs" onclick="switchTab('qs')">青少部</button>
      <button class="tab-btn" id="tab-lx" onclick="switchTab('lx')">留学预备</button>
    </div>
  </div>

  <!-- 青少 -->
  <div class="panel active" id="panel-qs">
    <div class="section-title">📋 基本信息</div>
    <div class="row">
      <div class="field"><label>申请人姓名<span class="req">*</span></label><input type="text" id="qs_applicant" placeholder="顾问姓名"></div>
      <div class="field"><label>校区</label><input type="text" id="qs_campus" placeholder="如：IFS校区"></div>
    </div>
    <div class="row">
      <div class="field"><label>学生姓名<span class="req">*</span></label><input type="text" id="qs_studentName" placeholder="学生姓名"></div>
      <div class="field"><label>年龄</label><input type="text" id="qs_age" placeholder="如：8岁"></div>
    </div>
    <div class="row">
      <div class="field"><label>学校</label><input type="text" id="qs_school" placeholder="就读学校"></div>
      <div class="field"><label>年级</label><input type="text" id="qs_grade" placeholder="如：2年级"></div>
    </div>
    <div class="section-title">📝 测试信息</div>
    <div class="row">
      <div class="field"><label>有无入学测试</label><div class="radio-group"><label><input type="radio" name="qs_hasEntryTest" value="有"> 有</label><label><input type="radio" name="qs_hasEntryTest" value="无" checked> 无</label></div></div>
      <div class="field"><label>入学测试成绩</label><input type="text" id="qs_entryTestScore" placeholder="如无请留空"></div>
    </div>
    <div class="row">
      <div class="field"><label>有无KP考试</label><div class="radio-group"><label><input type="radio" name="qs_hasKP" value="有"> 有</label><label><input type="radio" name="qs_hasKP" value="无" checked> 无</label></div></div>
      <div class="field"><label>KP考试成绩</label><input type="text" id="qs_kpScore" placeholder="如无请留空"></div>
    </div>
    <div class="row">
      <div class="field"><label>是否参见过校外英语学习</label><div class="radio-group"><label><input type="radio" name="qs_hasExternal" value="是"> 是</label><label><input type="radio" name="qs_hasExternal" value="否" checked> 否</label></div></div>
    </div>
    <div class="section-title">🎯 学习意向</div>
    <div class="row"><div class="field"><label>意向上课校区</label><input type="text" id="qs_preferCampus" placeholder="意向校区"></div></div>
    <div class="row"><div class="field"><label>可上课时间</label><input type="text" id="qs_availableTime" placeholder="如：暑假每周两天"></div></div>
    <div class="row"><div class="field"><label>学习目标</label><textarea id="qs_learningGoal" placeholder="请填写学习目标..."></textarea></div></div>
    <div class="row"><div class="field"><label>教学风格偏好</label><input type="text" id="qs_teachingStyle" placeholder="如：温柔型、互动型等"></div></div>
    <div class="section-title">🏫 插班试听信息</div>
    <div class="row">
      <div class="field"><label>意向插班试听班级班号</label><input type="text" id="qs_classNo" placeholder="班级编号"></div>
      <div class="field"><label>带班教师和助教姓名</label><input type="text" id="qs_teacherTA" placeholder="如：张老师 / 李助教"></div>
    </div>
    <div class="row">
      <div class="field"><label>试听班级上课时间</label><input type="text" id="qs_classTime" placeholder="如：周六 09:00-11:00"></div>
      <div class="field"><label>是否缴费（含定金）</label><div class="radio-group"><label><input type="radio" name="qs_hasPaid" value="是"> 是</label><label><input type="radio" name="qs_hasPaid" value="否" checked> 否</label></div></div>
    </div>
    <div class="notice"><strong>注意事项：</strong><br>· 如有学生需要插班试听，需<strong>提前申请</strong>，申请通过可进入对应班级试听，申请未通过不可进班试听。<br>· 意向插班试听班级<strong>必须未达到班级人数上限</strong>。<br>· 请将申请表发送至 <strong>liujingwen4@xhd.cn</strong> 审核。</div>
    <div class="btn-row">
      <button class="btn-primary" id="qs_btn" onclick="generate('qs')">📄 生成申请表 Word 文件</button>
      <button class="btn-reset" onclick="resetForm('qs')">重置</button>
    </div>
  </div>

  <!-- 留学预备 -->
  <div class="panel" id="panel-lx">
    <div class="section-title">📋 基本信息</div>
    <div class="row">
      <div class="field"><label>申请人姓名<span class="req">*</span></label><input type="text" id="lx_applicant" placeholder="顾问姓名"></div>
      <div class="field"><label>校区</label><input type="text" id="lx_campus" placeholder="如：IFS校区"></div>
    </div>
    <div class="row">
      <div class="field"><label>学生姓名<span class="req">*</span></label><input type="text" id="lx_studentName" placeholder="学生姓名"></div>
      <div class="field"><label>年龄</label><input type="text" id="lx_age" placeholder="如：16岁"></div>
    </div>
    <div class="row">
      <div class="field"><label>学校</label><input type="text" id="lx_school" placeholder="就读学校"></div>
      <div class="field"><label>年级</label><input type="text" id="lx_grade" placeholder="如：高二"></div>
    </div>
    <div class="section-title">📝 测试 & 考试信息</div>
    <div class="row">
      <div class="field"><label>有无入学测试</label><div class="radio-group"><label><input type="radio" name="lx_hasEntryTest" value="有"> 有</label><label><input type="radio" name="lx_hasEntryTest" value="无" checked> 无</label></div></div>
      <div class="field"><label>入学测试成绩</label><input type="text" id="lx_entryTestScore" placeholder="如无请留空"></div>
    </div>
    <div class="row">
      <div class="field"><label>有无考试需求</label><div class="radio-group"><label><input type="radio" name="lx_hasExamNeed" value="有"> 有</label><label><input type="radio" name="lx_hasExamNeed" value="无" checked> 无</label></div></div>
      <div class="field"><label>计划考试类型 / 学习目的</label><input type="text" id="lx_examType" placeholder="如：雅思 / GPA提升"></div>
    </div>
    <div class="row">
      <div class="field"><label>是否有英语学习经历</label><div class="radio-group"><label><input type="radio" name="lx_hasEnglishHistory" value="是"> 是</label><label><input type="radio" name="lx_hasEnglishHistory" value="否" checked> 否</label></div></div>
    </div>
    <div class="section-title">🎯 学习意向</div>
    <div class="row"><div class="field"><label>意向上课校区</label><input type="text" id="lx_preferCampus" placeholder="意向校区"></div></div>
    <div class="row"><div class="field"><label>可上课时间</label><input type="text" id="lx_availableTime" placeholder="如：周末上午"></div></div>
    <div class="row"><div class="field"><label>学习目标</label><textarea id="lx_learningGoal" placeholder="请填写学习目标..."></textarea></div></div>
    <div class="row"><div class="field"><label>教学风格偏好</label><input type="text" id="lx_teachingStyle" placeholder="如：严格型、启发型等"></div></div>
    <div class="section-title">🏫 插班试听信息</div>
    <div class="row">
      <div class="field"><label>意向插班试听班级班号</label><input type="text" id="lx_classNo" placeholder="班级编号"></div>
      <div class="field"><label>带班教师和助教姓名</label><input type="text" id="lx_teacherTA" placeholder="如：张老师 / 李助教"></div>
    </div>
    <div class="row">
      <div class="field"><label>试听班级上课时间</label><input type="text" id="lx_classTime" placeholder="如：周六 09:00-11:00"></div>
      <div class="field"><label>是否缴费（含定金）</label><div class="radio-group"><label><input type="radio" name="lx_hasPaid" value="是"> 是</label><label><input type="radio" name="lx_hasPaid" value="否" checked> 否</label></div></div>
    </div>
    <div class="notice"><strong>注意事项：</strong><br>· 如有学生需要插班试听，需<strong>提前申请</strong>，申请通过可进入对应班级试听，申请未通过不可进班试听。<br>· 意向插班试听班级<strong>必须未达到班级人数上限</strong>。<br>· 请将申请表发送至 <strong>liujingwen4@xhd.cn</strong> 审核。</div>
    <div class="btn-row">
      <button class="btn-primary" id="lx_btn" onclick="generate('lx')">📄 生成申请表 Word 文件</button>
      <button class="btn-reset" onclick="resetForm('lx')">重置</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('panel-' + t).classList.add('active');
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 3000);
}
function getRadio(name) { const el = document.querySelector('input[name="' + name + '"]:checked'); return el ? el.value : ''; }
function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function resetForm(prefix) {
  const p = document.getElementById('panel-' + prefix);
  p.querySelectorAll('input[type=text], textarea').forEach(el => el.value = '');
  p.querySelectorAll('input[type=radio]').forEach(el => { if (el.value === '无' || el.value === '否') el.checked = true; });
}
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function cellPara(text) {
  const t = esc(text);
  return '<w:p><w:pPr><w:spacing w:after="0" w:line="240" w:lineRule="auto"/><w:jc w:val="center"/>' +
    '<w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr></w:pPr>' +
    (t ? '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t xml:space="preserve">' + t + '</w:t></w:r>' : '') +
    '</w:p>';
}
function tc(width, text, gridSpan) {
  const span = (gridSpan > 1) ? '<w:gridSpan w:val="' + gridSpan + '"/>' : '';
  return '<w:tc><w:tcPr><w:tcW w:w="' + width + '" w:type="dxa"/>' + span + '<w:vAlign w:val="center"/></w:tcPr>' + cellPara(text) + '</w:tc>';
}
function row4(l1,v1,l2,v2,h) {
  return '<w:tr><w:trPr><w:trHeight w:val="' + (h||805) + '" w:hRule="atLeast"/></w:trPr>' +
    tc(2689,l1) + tc(1984,v1) + tc(1564,l2) + tc(2079,v2) + '</w:tr>';
}
function row2(label,val,h) {
  return '<w:tr><w:trPr><w:trHeight w:val="' + (h||805) + '" w:hRule="atLeast"/></w:trPr>' +
    tc(2689,label) + tc(5627,val,3) + '</w:tr>';
}

function tblXml(rows, centerTable) {
  const jc = centerTable ? '<w:jc w:val="center"/>' : '';
  return '<w:tbl>' +
    '<w:tblPr><w:tblW w:w="8316" w:type="dxa"/>' + jc +
    '<w:tblBorders>' +
      '<w:top w:val="single" w:color="auto" w:sz="4" w:space="0"/>' +
      '<w:left w:val="single" w:color="auto" w:sz="4" w:space="0"/>' +
      '<w:bottom w:val="single" w:color="auto" w:sz="4" w:space="0"/>' +
      '<w:right w:val="single" w:color="auto" w:sz="4" w:space="0"/>' +
      '<w:insideH w:val="single" w:color="auto" w:sz="4" w:space="0"/>' +
      '<w:insideV w:val="single" w:color="auto" w:sz="4" w:space="0"/>' +
    '</w:tblBorders>' +
    '<w:tblLayout w:type="autofit"/>' +
    '<w:tblCellMar><w:top w:w="0" w:type="dxa"/><w:left w:w="108" w:type="dxa"/><w:bottom w:w="0" w:type="dxa"/><w:right w:w="108" w:type="dxa"/></w:tblCellMar>' +
    '</w:tblPr>' +
    '<w:tblGrid><w:gridCol w:w="2689"/><w:gridCol w:w="1984"/><w:gridCol w:w="1564"/><w:gridCol w:w="2079"/></w:tblGrid>' +
    rows + '</w:tbl>';
}

function notesPara(indent) {
  // indent = left indentation in dxa to align text with a centered table
  const ind = indent ? '<w:ind w:left="' + indent + '"/>' : '';
  const ppr1 = '<w:pPr><w:spacing w:after="0"/>' + ind + '</w:pPr>';
  const ppr  = '<w:pPr>' + ind + '</w:pPr>';
  return '<w:p><w:pPr><w:spacing w:after="0"/></w:pPr></w:p>' +
    '<w:p>' + ppr1 +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t xml:space="preserve">如有学生需要插班试听，需</w:t></w:r>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:color w:val="C00000"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t>提前</w:t></w:r>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t>申请。申请通过可进入对应班级试听，申请未通过不可进班试听。</w:t></w:r></w:p>' +
    '<w:p>' + ppr +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t xml:space="preserve">意向插班试听班级</w:t></w:r>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:color w:val="C00000"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t>必须未达到班级人数上限</w:t></w:r>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t>。</w:t></w:r></w:p>' +
    '<w:p>' + ppr +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t>发送插班试听课申请表至liujingwen4@xhd.cn申请插班试听。</w:t></w:r></w:p>';
}

function wrapDoc(titleXml, tableXml, pgMar, notesIndent) {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:body>' + titleXml + tableXml + notesPara(notesIndent) +
    '<w:sectPr><w:pgSz w:w="11906" w:h="16838"/>' + pgMar + '</w:sectPr>' +
    '</w:body></w:document>';
}

function buildQS(d) {
  const rows =
    row4('申请人姓名',d.applicant,'校区',d.campus,805) +
    row4('学生姓名',d.studentName,'年龄',d.age,805) +
    row4('学校',d.school,'年级',d.grade,805) +
    row4('有无入学测试',d.hasEntryTest,'入学测试成绩',d.entryTestScore,805) +
    row4('有无KP考试',d.hasKP,'KP考试成绩',d.kpScore,805) +
    row2('是否参见过校外英语学习',d.hasExternal) +
    row2('意向上课校区',d.preferCampus) +
    row2('可上课时间',d.availableTime) +
    row2('学习目标',d.learningGoal) +
    row2('教学风格偏好',d.teachingStyle) +
    row4('意向插班试听班级班号',d.classNo,'带班教师和助教姓名',d.teacherTA) +
    row4('试听班级上课时间',d.classTime,'是否缴费（包括定金等）',d.hasPaid);
  const title = '<w:p><w:pPr><w:jc w:val="center"/><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:b/><w:bCs/><w:sz w:val="28"/><w:szCs w:val="28"/></w:rPr></w:pPr>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:b/><w:bCs/><w:sz w:val="28"/><w:szCs w:val="28"/></w:rPr><w:t>插班试听课申请表</w:t></w:r></w:p>';
  return wrapDoc(title, tblXml(rows, true), '<w:pgMar w:top="1080" w:right="1080" w:bottom="1080" w:left="1080"/>', 715);
}

function buildLX(d) {
  const rows =
    row4('申请人姓名',d.applicant,'校区',d.campus,661) +
    row4('学生姓名',d.studentName,'年龄',d.age,684) +
    row4('学校',d.school,'年级',d.grade,805) +
    row4('有无入学测试',d.hasEntryTest,'入学测试成绩',d.entryTestScore,805) +
    row4('有无考试需求',d.hasExamNeed,'计划考试类型/学习目的',d.examType,805) +
    row2('是否有英语学习经历',d.hasEnglishHistory) +
    row2('意向上课校区',d.preferCampus) +
    row2('可上课时间',d.availableTime) +
    row2('学习目标',d.learningGoal) +
    row2('教学风格偏好',d.teachingStyle) +
    row4('意向插班试听班级班号',d.classNo,'带班教师和助教姓名',d.teacherTA) +
    row4('试听班级上课时间',d.classTime,'是否缴费（包括定金等）',d.hasPaid);
  const title =
    '<w:p><w:pPr><w:jc w:val="center"/><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:b/><w:bCs/><w:sz w:val="28"/><w:szCs w:val="28"/></w:rPr></w:pPr>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:b/><w:bCs/><w:sz w:val="28"/><w:szCs w:val="28"/></w:rPr><w:t>留学预备</w:t></w:r></w:p>' +
    '<w:p><w:pPr><w:jc w:val="center"/><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr></w:pPr>' +
    '<w:r><w:rPr><w:rFonts w:ascii="黑体" w:hAnsi="黑体" w:eastAsia="黑体"/><w:sz w:val="21"/><w:szCs w:val="21"/></w:rPr><w:t>插班试听课申请表</w:t></w:r></w:p>';
  // 留学预备: 页边距 top/bottom=1440, left/right=1800 → 内容宽=11906-3600=8306≈8316，表格自然撑满，不需要居中
  return wrapDoc(title, tblXml(rows, false), '<w:pgMar w:top="1440" w:right="1800" w:bottom="1440" w:left="1800"/>', 0);
}

async function generate(prefix) {
  const applicant = v(prefix + '_applicant');
  const studentName = v(prefix + '_studentName');
  if (!applicant) { showToast('请填写申请人姓名', 'error'); return; }
  if (!studentName) { showToast('请填写学生姓名', 'error'); return; }
  const btn = document.getElementById(prefix + '_btn');
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    let xml;
    if (prefix === 'qs') {
      xml = buildQS({ applicant, studentName,
        campus: v('qs_campus'), age: v('qs_age'), school: v('qs_school'), grade: v('qs_grade'),
        hasEntryTest: getRadio('qs_hasEntryTest'), entryTestScore: v('qs_entryTestScore'),
        hasKP: getRadio('qs_hasKP'), kpScore: v('qs_kpScore'),
        hasExternal: getRadio('qs_hasExternal'),
        preferCampus: v('qs_preferCampus'), availableTime: v('qs_availableTime'),
        learningGoal: v('qs_learningGoal'), teachingStyle: v('qs_teachingStyle'),
        classNo: v('qs_classNo'), teacherTA: v('qs_teacherTA'),
        classTime: v('qs_classTime'), hasPaid: getRadio('qs_hasPaid') });
    } else {
      xml = buildLX({ applicant, studentName,
        campus: v('lx_campus'), age: v('lx_age'), school: v('lx_school'), grade: v('lx_grade'),
        hasEntryTest: getRadio('lx_hasEntryTest'), entryTestScore: v('lx_entryTestScore'),
        hasExamNeed: getRadio('lx_hasExamNeed'), examType: v('lx_examType'),
        hasEnglishHistory: getRadio('lx_hasEnglishHistory'),
        preferCampus: v('lx_preferCampus'), availableTime: v('lx_availableTime'),
        learningGoal: v('lx_learningGoal'), teachingStyle: v('lx_teachingStyle'),
        classNo: v('lx_classNo'), teacherTA: v('lx_teacherTA'),
        classTime: v('lx_classTime'), hasPaid: getRadio('lx_hasPaid') });
    }
    const zip = new JSZip();
    zip.file('[Content_Types].xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>');
    zip.file('_rels/.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>');
    zip.file('word/document.xml', xml);
    zip.file('word/_rels/document.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>');
    const blob = await zip.generateAsync({ type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const today = new Date();
    const date = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');
    const label = prefix === 'qs' ? '青少' : '留学预备';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '插班试听申请_' + label + '_' + studentName + '_' + date + '.docx';
    a.click();
    showToast('✅ 申请表已生成！', 'success');
  } catch(e) { console.error(e); showToast('生成失败，请重试', 'error'); }
  finally { btn.disabled = false; btn.textContent = '📄 生成申请表 Word 文件'; }
}
</script>
